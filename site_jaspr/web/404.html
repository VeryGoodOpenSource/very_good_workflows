<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Very Good Workflows</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
      color: #1a1a1a;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    h1 { font-size: 4rem; font-weight: 700; color: #2a48df; margin-bottom: 0.5rem; }
    p { font-size: 1.125rem; color: #666; margin-bottom: 1.5rem; }
    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #2a48df;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    a:hover { background: #1e38b0; }
    @media (prefers-color-scheme: dark) {
      body { background: #0b0d0e; color: #e0e0e0; }
      h1 { color: #66fbd1; }
      p { color: #999; }
      a { background: #66fbd1; color: #0b0d0e; }
      a:hover { background: #52e0b8; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>The page you're looking for doesn't exist.</p>
    <a href="/docs/overview">Go to Documentation</a>
  </div>
</body>
</html>
