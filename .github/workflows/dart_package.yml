name: Dart Package Workflow

on:
  workflow_call:
    inputs:
      analyze_directories:
        required: false
        type: string
        default: "lib test"
      concurrency:
        required: false
        type: number
        default: 4
      coverage_excludes:
        required: false
        type: string
        default: ""
        description: "A glob pattern to exclude files from coverage (e.g. '**/*.g.dart'). Only a single glob pattern is supported."
      dart_sdk:
        required: false
        type: string
        default: "stable"
      format_directories:
        required: false
        type: string
        default: "."
      format_line_length:
        required: false
        type: string
      min_coverage:
        required: false
        type: number
        default: 100
      platform:
        required: false
        type: string
        default: "vm"
      check_ignore:
        required: false
        type: boolean
        default: false
        description: "[DEPRECATED] This input has no effect and will be removed in a future release. See https://github.com/VeryGoodOpenSource/very_good_cli/issues for tracking."
      report_on:
        required: false
        type: string
        default: "lib"
      runs_on:
        required: false
        type: string
        default: "ubuntu-latest"
      setup:
        required: false
        type: string
        default: ""
      working_directory:
        required: false
        type: string
        default: "."
      run_skipped:
        required: false
        type: boolean
        default: false
      no_example:
        required: false
        type: boolean
        default: false
      run_bloc_lint:
        type: boolean
        default: true
        required: false
      show_uncovered:
        required: false
        type: boolean
        default: false
        description: "Whether to show uncovered lines when coverage is below 100%."
      collect_coverage_from:
        required: false
        type: string
        default: "imports"
        description: "Whether to collect coverage from imported files only or all files. Allowed values: imports, all."
    secrets:
      ssh_key:
        required: false

jobs:
  build:
    defaults:
      run:
        working-directory: ${{inputs.working_directory}}

    runs-on: ${{inputs.runs_on}}

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🎯 Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{inputs.dart_sdk}}

      - name: 🤫 Set SSH Key
        env:
          ssh_key: ${{secrets.ssh_key}}
        if: env.ssh_key != null
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{secrets.ssh_key}}

      - name: 📦 Install Dependencies
        run: |
          dart pub global activate very_good_cli
          dart pub get ${{(inputs.no_example && '--no-example') || ''}}

      - name: ⚙️ Run Setup
        if: "${{inputs.setup != ''}}"
        run: ${{inputs.setup}}

      - name: ✨ Check Formatting
        run: dart format ${{inputs.format_line_length && format('--line-length {0}', inputs.format_line_length) || ''}} --set-exit-if-changed ${{inputs.format_directories}}

      - name: 🕵️ Analyze
        run: dart analyze --fatal-infos --fatal-warnings ${{inputs.analyze_directories}}

      - name: ✅ Bloc Lint
        if: ${{inputs.run_bloc_lint}}
        run: |
          dart pub global activate bloc_tools
          bloc lint .

      - name: 🧪 Run Tests
        run: >-
          very_good dart test
          -j ${{inputs.concurrency}}
          --coverage
          --platform ${{inputs.platform}}
          --min-coverage ${{inputs.min_coverage}}
          ${{inputs.coverage_excludes != '' && format('--exclude-coverage "{0}"', inputs.coverage_excludes) || ''}}
          ${{format('--report-on {0}', inputs.report_on)}}
          ${{inputs.collect_coverage_from != 'imports' && format('--collect-coverage-from {0}', inputs.collect_coverage_from) || ''}}
          ${{inputs.show_uncovered && '--show-uncovered' || ''}}
          ${{inputs.run_skipped && '-- --run-skipped' || ''}}
