name: Dart Package Workflow

on:
  workflow_call:
    inputs:
      analyze_directories:
        required: false
        type: string
        default: "lib test"
      collect_coverage_from:
        required: false
        type: string
        default: "imports"
        description: "Whether to collect coverage from imported files only or all files. Allowed values: imports, all."
      concurrency:
        required: false
        type: number
        default: 4
      coverage_excludes:
        required: false
        type: string
        default: ""
        description: "Space-separated list of globs to exclude files from the coverage report (e.g. '**/*.g.dart **/gen/*.dart')."
      dart_sdk:
        required: false
        type: string
        default: "stable"
      format_directories:
        required: false
        type: string
        default: "."
      format_line_length:
        required: false
        type: string
      min_coverage:
        required: false
        type: number
        default: 100
      no_example:
        required: false
        type: boolean
        default: false
      platform:
        required: false
        type: string
        default: "vm"
      check_ignore:
        required: false
        type: boolean
        default: false
        description: "Whether to check for and respect coverage ignore comments (e.g. // coverage:ignore-line)."
      report_on:
        required: false
        type: string
        default: "lib"
      run_bloc_lint:
        required: false
        type: boolean
        default: true
      run_skipped:
        required: false
        type: boolean
        default: false
      runs_on:
        required: false
        type: string
        default: "ubuntu-latest"
      setup:
        required: false
        type: string
        default: ""
      show_uncovered:
        required: false
        type: boolean
        default: true
        description: "Whether to show uncovered lines when coverage is below 100%."
      test_optimization:
        required: false
        type: boolean
        default: true
        description: "Whether to apply optimizations for test performance."
      working_directory:
        required: false
        type: string
        default: "."
    secrets:
      ssh_key:
        required: false

jobs:
  build:
    defaults:
      run:
        working-directory: ${{inputs.working_directory}}

    runs-on: ${{inputs.runs_on}}

    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🎯 Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{inputs.dart_sdk}}

      - name: 🤫 Set SSH Key
        env:
          ssh_key: ${{secrets.ssh_key}}
        if: env.ssh_key != null
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{secrets.ssh_key}}

      - name: 📦 Install Dependencies
        run: |
          dart pub global activate very_good_cli 1.1.0
          dart pub get ${{(inputs.no_example && '--no-example') || ''}}

      - name: ⚙️ Run Setup
        if: "${{inputs.setup != ''}}"
        run: ${{inputs.setup}}

      - name: ✨ Check Formatting
        run: dart format ${{inputs.format_line_length && format('--line-length {0}', inputs.format_line_length) || ''}} --set-exit-if-changed ${{inputs.format_directories}}

      - name: 🕵️ Analyze
        run: dart analyze --fatal-infos --fatal-warnings ${{inputs.analyze_directories}}

      - name: ✅ Bloc Lint
        if: ${{inputs.run_bloc_lint}}
        run: |
          dart pub global activate bloc_tools
          bloc lint .

      - name: 🧪 Run Tests
        run: >-
          very_good dart test
          -j ${{inputs.concurrency}}
          --coverage
          --platform ${{inputs.platform}}
          --min-coverage ${{inputs.min_coverage}}
          ${{inputs.coverage_excludes != '' && format('--exclude-coverage "{0}"', inputs.coverage_excludes) || ''}}
          $(echo "${{inputs.report_on}}" | sed 's/[, ][, ]*/ --report-on /g; s/^/--report-on /')
          ${{inputs.collect_coverage_from != 'imports' && format('--collect-coverage-from {0}', inputs.collect_coverage_from) || ''}}
          ${{inputs.check_ignore && '--check-ignore' || '--no-check-ignore'}}
          ${{inputs.show_uncovered && '--show-uncovered' || ''}}
          ${{inputs.run_skipped && '--run-skipped' || ''}}
          ${{(inputs.test_optimization && '--optimization') || '--no-optimization'}}
          --test-randomize-ordering-seed random
